<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
</head>
<body>
  <p id="msg" style="font-family:sans-serif;padding:20px">Väntar på Homey...</p>
  <script>
    Homey.ready(function(homey) {
      document.getElementById('msg').textContent = 'Homey redo! Hämtar status...';
      homey.api('GET', '/status', null, function(err, result) {
        if (err) {
          document.getElementById('msg').textContent = 'FEL: ' + (typeof err === 'string' ? err : JSON.stringify(err));
        } else {
          document.getElementById('msg').textContent = 'Batteri: ' + result.battery + '% | OK';
        }
      });
    });
  </script>
</body>
</html>
