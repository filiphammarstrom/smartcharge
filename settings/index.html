<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 480px; color: #222; }
    label { display: block; margin-top: 14px; font-size: 14px; font-weight: 600; }
    input, select { width: 100%; box-sizing: border-box; padding: 6px 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    input[type=checkbox] { width: auto; }
    .row { display: flex; gap: 8px; margin-top: 16px; }
    button { flex: 1; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    #saveBtn { background: #C8102E; color: #fff; }
    #refreshBtn { background: #eee; color: #333; }
    .status { margin-top: 10px; font-size: 13px; min-height: 18px; }
    .status.ok { color: green; }
    .status.error { color: red; }
    .info-block { background: #f5f5f5; border-radius: 4px; padding: 10px 12px; margin-top: 8px; font-size: 13px; }
    h3 { margin-top: 24px; margin-bottom: 4px; font-size: 15px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; margin: 0; }
  </style>
</head>
<body>

  <h3>Inställningar</h3>

  <label for="area">Elområde</label>
  <select id="area">
    <option value="SE1">SE1 (Luleå)</option>
    <option value="SE2">SE2 (Sundsvall)</option>
    <option value="SE3" selected>SE3 (Stockholm)</option>
    <option value="SE4">SE4 (Malmö)</option>
  </select>

  <label for="floor">Golv-% (nödladdning under denna nivå)</label>
  <input type="number" id="floor" min="10" max="50" value="25" />

  <label for="normalTarget">Normal mål-% (utan resa)</label>
  <input type="number" id="normalTarget" min="20" max="100" value="50" />

  <label style="margin-top:14px">
    <input type="checkbox" id="autoCharge" checked />
    &nbsp;Automatisk laddning aktiv
  </label>

  <div class="row">
    <button id="saveBtn">Spara</button>
    <button id="refreshBtn">Uppdatera</button>
  </div>
  <p class="status" id="saveStatus"></p>

  <h3>Status</h3>
  <div class="info-block">Batteri: <strong id="batteryValue">–</strong></div>
  <div class="info-block">Nästa resa: <span id="tripValue">–</span></div>

  <h3>Senaste beslut</h3>
  <div class="info-block"><pre id="decisionValue">–</pre></div>

  <script>
    let HomeyInstance = null;

    function $(id) {
      return document.getElementById(id);
    }

    function setStatus(message, kind) {
      const el = $('saveStatus');
      el.textContent = message || '';
      el.className = ('status ' + (kind || '')).trim();
    }

    function formatTrip(nextTrip) {
      if (!nextTrip || !nextTrip.departureTime) return 'Ingen aktiv resa';
      const dt = new Date(nextTrip.departureTime);
      return dt.toLocaleString('sv-SE') + ' → ' + nextTrip.targetPercent + '%';
    }

    function formatDecision(lastDecision) {
      if (!lastDecision) return '–';
      return JSON.stringify(lastDecision, null, 2);
    }

    function loadSettingsFromStatus(status) {
      const s = status.settings || {};
      $('area').value        = s.area || 'SE3';
      $('floor').value       = s.floor != null ? s.floor : 25;
      $('normalTarget').value = s.normalTarget != null ? s.normalTarget : 50;
      $('autoCharge').checked = !!s.autoCharge;

      $('batteryValue').textContent  = status.battery == null ? '–' : status.battery + '%';
      $('tripValue').textContent     = formatTrip(status.nextTrip);
      $('decisionValue').textContent = formatDecision(status.lastDecision);
    }

    function api(method, path, body) {
      return new Promise(function(resolve, reject) {
        HomeyInstance.api(method, path, body || null, function(err, result) {
          if (err) return reject(err);
          resolve(result);
        });
      });
    }

    function loadStatus() {
      setStatus('');
      api('GET', '/status').then(function(status) {
        loadSettingsFromStatus(status);
      }).catch(function(err) {
        setStatus('Kunde inte läsa status: ' + (err.message || err), 'error');
      });
    }

    function saveSettings() {
      setStatus('');
      $('saveBtn').disabled = true;

      var payload = {
        area:         $('area').value,
        floor:        Number($('floor').value),
        normalTarget: Number($('normalTarget').value),
        autoCharge:   $('autoCharge').checked
      };

      api('POST', '/settings', payload).then(function() {
        setStatus('Inställningar sparade.', 'ok');
        loadStatus();
      }).catch(function(err) {
        setStatus('Kunde inte spara: ' + (err.message || err), 'error');
      }).then(function() {
        $('saveBtn').disabled = false;
      });
    }

    function init() {
      $('saveBtn').addEventListener('click', saveSettings);
      $('refreshBtn').addEventListener('click', loadStatus);
      loadStatus();
    }

    function onHomeyReady(Homey) {
      HomeyInstance = Homey;
      init();
      Homey.ready();
    }
  </script>
</body>
</html>
